services:
  core:
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - ANSWER_MODEL=gemma3:27b
      - EMBEDDING_MODEL=qwen3-embedding:8b
      - MAX_OLLAMA_PARALLEL_CALLS=4
      - ANNOTATION_DEFAULT_CHUNK_SIZE=1600
      - QUERY_N_RESULTS=12
      - QUERY_NEIGHBOR_TOP_N=5
      # Optional: only expand neighbors for hits with distance <= threshold
      # - QUERY_NEIGHBOR_DISTANCE_THRESHOLD=1.0
  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    devices:
      - nvidia.com/gpu=all
    # for amd we might need to link /dev/kfd, /dev/dri etc
volumes:
  ollama_models:
